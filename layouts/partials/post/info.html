<div class="info">

  {{ $Site := .Site }}
  {{ if .Params.series }}
  <p class="seriesname">
    Series: <a href="{{ $Site.BaseURL }}series/{{ .Params.series | urlize }}">{{ .Params.series }}</a>
  </p>
  {{ end }}

  {{ if .Params.featuredImage }}
  <p>
    <img src="{{.Params.featuredImage}}" alt="{{ .Params.featuredImageAlt | default .Title }}" loading="lazy"><br>
  </p>
  {{ end }}
</div>
