<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en-us" lang="en-us">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">

    <!-- Enable responsiveness; viewport-fit=cover enables env(safe-area-inset-*) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <link rel="icon" type="image/svg+xml" href="{{BASE_URL}}favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="any" href="{{BASE_URL}}favicon.svg">

    <!-- Font: Figtree (self-hosted, OFL 1.1) -->
    <link rel="preload" as="font" type="font/woff2" href="{{BASE_URL}}fonts/figtree.woff2" crossorigin>

    <!-- META -->
    <title>{{META_TITLE}}</title>
    <meta property="og:title" content="{{META_TITLE}}" />
    <meta name="twitter:title" content="{{META_TITLE}}" />
    <meta name="application-name" content="{{META_TITLE}}" />
    <meta property="og:site_name" content="{{BRAND}}" />

    <meta name="description" content="{{DESCRIPTION}}" />
    <meta itemprop="description" content="{{DESCRIPTION}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />

    <base href="{{PAGE_URL}}" />
    <link rel="canonical" href="{{PAGE_URL}}" itemprop="url" />
    <meta name="url" content="{{PAGE_URL}}" />
    <meta name="twitter:url" content="{{PAGE_URL}}" />
    <meta property="og:url" content="{{PAGE_URL}}" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <meta property="og:type" content="{{OG_TYPE}}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="{{OG_IMAGE}}" />

    <meta name="robots" content="index,follow" />
    <meta name="googlebot" content="index,follow" />
    <meta name="apple-mobile-web-app-title" content="{{BRAND}}" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <link type="text/css" rel="stylesheet" href="{{BASE_URL}}{{CSS_BUNDLE}}">

    {{CSS_VARIABLES}}
    {{STRUCTURED_DATA}}
</head>
<body class="dark-theme">
    <a class="u-skip-link" href="#main-content" data-i18n="skip_to_content">Skip to main content</a>

    <!-- Top bar -->
    <header class="topbar">
        <button class="topbar-menu" id="topbar-menu" aria-label="Toggle menu" aria-expanded="false" aria-controls="sidebar" data-i18n="toggle_menu" data-i18n-attr="aria-label">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>

        <a href="{{BASE_URL}}" class="topbar-brand" data-i18n="site_title">1 in 7</a>

        <div class="topbar-search">
            <input type="search" id="search-input"
                placeholder="Search resources..."
                aria-label="Search resources"
                data-i18n="search_placeholder"
                data-i18n-attr="placeholder"
                data-i18n-aria="search_label">
            <div id="search-results" class="search-results" role="listbox" aria-live="polite" aria-atomic="false"></div>
        </div>

        <div class="topbar-actions">
            <select id="lang-picker" class="topbar-lang" aria-label="Select language">
                <option value="en">EN</option>
                <option value="ar">عر</option>
                <option value="bn">বা</option>
                <option value="ca">CA</option>
                <option value="zh">中</option>
                <option value="nl">NL</option>
                <option value="fi">FI</option>
                <option value="fr">FR</option>
                <option value="de">DE</option>
                <option value="el">EL</option>
                <option value="hi">हि</option>
                <option value="is">IS</option>
                <option value="ga">GA</option>
                <option value="it">IT</option>
                <option value="ja">日</option>
                <option value="ko">한</option>
                <option value="no">NO</option>
                <option value="pl">PL</option>
                <option value="pt">PT</option>
                <option value="ru">RU</option>
                <option value="es">ES</option>
                <option value="sw">SW</option>
                <option value="sv">SV</option>
                <option value="tr">TR</option>
                <option value="uk">UK</option>
                <option value="vi">VI</option>
            </select>
            <button class="topbar-theme" id="toggle-theme-btn" title="Toggle light/dark mode" aria-label="Toggle light/dark mode" data-i18n="toggle_theme" data-i18n-attr="title,aria-label">
                <svg class="toggle-icon sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="toggle-icon moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <!-- Sidebar backdrop (mobile only; closes sidebar on tap) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" data-open="false"></div>

    <!-- Shell: sidebar + content -->
    <div class="shell">
        <aside class="sidebar" id="sidebar" data-open="false">
            {{SIDEBAR_NAV}}
            {{FOOTER_LINKS}}
            {{SOCIALS}}
            <p class="footnote">
                &copy; {{YEAR}} Bloomed Health
            </p>
        </aside>

        <main class="content" id="main-content">
            {{PAGE_CONTENT}}
        </main>
    </div>

    <!-- Bottom nav (mobile only) -->
    <nav class="bottomnav" aria-label="Primary mobile navigation">
        <a href="{{BASE_URL}}" class="bottomnav-item" data-i18n="nav_home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-5h-2v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span>Home</span>
        </a>
        <a href="{{BASE_URL}}quiz/" class="bottomnav-item" data-i18n="nav_quiz">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 10l2 2 4-4"/><path d="M9 16h6"/></svg>
            <span>Quiz</span>
        </a>
        <a href="{{BASE_URL}}endometriosis/" class="bottomnav-item" data-i18n="nav_learn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>Learn</span>
        </a>
        <a href="{{BASE_URL}}take-action/" class="bottomnav-item" data-i18n="nav_help">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg>
            <span>Help</span>
        </a>
    </nav>

    <!-- Back-to-top -->
    <button class="back-to-top-v2" id="back-to-top" aria-label="Back to top" title="Back to top" data-i18n="back_to_top" data-i18n-attr="title,aria-label">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"/>
        </svg>
    </button>

    <script>
    // Module URLs for extracted JS
    window.__searchIndexURL = '{{BASE_URL}}index.json';
    window.__translationsURL = '{{BASE_URL}}i18n/translations.json';

    // Sidebar open/close
    (function() {
        var menuBtn = document.getElementById('topbar-menu');
        var sidebar = document.getElementById('sidebar');
        var backdrop = document.getElementById('sidebar-backdrop');
        if (!menuBtn || !sidebar) return;

        function setOpen(open) {
            sidebar.setAttribute('data-open', open ? 'true' : 'false');
            if (backdrop) backdrop.setAttribute('data-open', open ? 'true' : 'false');
            menuBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
            document.body.style.overflow = open ? 'hidden' : '';
            // Move focus into the sidebar when opening (mobile keyboard users)
            if (open) {
                var firstLink = sidebar.querySelector('a, button');
                if (firstLink && window.innerWidth < 1024) firstLink.focus();
            }
        }

        menuBtn.addEventListener('click', function() {
            var isOpen = sidebar.getAttribute('data-open') === 'true';
            setOpen(!isOpen);
        });

        if (backdrop) backdrop.addEventListener('click', function() { setOpen(false); });

        // Close on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && sidebar.getAttribute('data-open') === 'true') {
                setOpen(false);
                menuBtn.focus();
            }
        });

        // Auto-close when crossing into desktop breakpoint
        var desktopMQ = window.matchMedia('(min-width: 64rem)');
        desktopMQ.addEventListener('change', function(e) {
            if (e.matches) setOpen(false);
        });
    })();

    // Theme toggle (with first-load OS preference detection)
    (function() {
        var btn = document.getElementById('toggle-theme-btn');
        if (!btn) return;
        var sunIcon = btn.querySelector('.sun-icon');
        var moonIcon = btn.querySelector('.moon-icon');
        var stored = localStorage.getItem('theme');

        if (stored === 'dark') document.body.classList.add('dark-theme');
        else if (stored === 'light') document.body.classList.remove('dark-theme');
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.body.classList.remove('dark-theme');
        }

        function updateIcons() {
            var isDark = document.body.classList.contains('dark-theme');
            if (sunIcon) sunIcon.style.display = isDark ? 'none' : 'block';
            if (moonIcon) moonIcon.style.display = isDark ? 'block' : 'none';
        }

        btn.addEventListener('click', function() {
            document.body.classList.toggle('dark-theme');
            var isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcons();
        });

        updateIcons();
    })();

    // Back-to-top — always uses window scroll
    (function() {
        var btn = document.getElementById('back-to-top');
        if (!btn) return;
        function onScroll() {
            var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            btn.classList.toggle('visible', scrollTop > 300);
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        btn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();

    // Mark current page in bottom nav
    (function() {
        var path = window.location.pathname.replace(/\/$/, '');
        document.querySelectorAll('.bottomnav-item').forEach(function(a) {
            var href = a.getAttribute('href').replace(/\/$/, '');
            var hrefPath;
            try { hrefPath = new URL(href, window.location.href).pathname.replace(/\/$/, ''); }
            catch (e) { hrefPath = href; }
            if (path === hrefPath) a.setAttribute('aria-current', 'page');
        });
    })();
    </script>

    <script src="{{BASE_URL}}{{JS_BUNDLE}}"></script>
</body>
</html>
