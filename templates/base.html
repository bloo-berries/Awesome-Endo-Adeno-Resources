<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en-us" lang="en-us">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">

    <!-- Enable responsiveness; viewport-fit=cover enables env(safe-area-inset-*) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <link rel="icon" type="image/svg+xml" href="{{BASE_URL}}favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="any" href="{{BASE_URL}}favicon.svg">
    <link rel="apple-touch-icon" href="{{BASE_URL}}brand/apple-touch-icon.png">
    <link rel="manifest" href="{{BASE_URL}}manifest.json">

    <!-- Font: Figtree (self-hosted, OFL 1.1) -->
    <link rel="preload" as="font" type="font/woff2" href="{{BASE_URL}}fonts/figtree.woff2" crossorigin>

    <!-- META -->
    <title>{{META_TITLE}}</title>
    <meta property="og:title" content="{{META_TITLE}}" />
    <meta name="twitter:title" content="{{META_TITLE}}" />
    <meta name="application-name" content="{{META_TITLE}}" />
    <meta property="og:site_name" content="{{BRAND}}" />

    <meta name="description" content="{{DESCRIPTION}}" />
    <meta itemprop="description" content="{{DESCRIPTION}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />

    <base href="{{PAGE_URL}}" />
    <link rel="canonical" href="{{PAGE_URL}}" itemprop="url" />
    <meta name="url" content="{{PAGE_URL}}" />
    <meta name="twitter:url" content="{{PAGE_URL}}" />
    <meta property="og:url" content="{{PAGE_URL}}" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <meta property="og:type" content="{{OG_TYPE}}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="{{OG_IMAGE}}" />

    <meta name="robots" content="index,follow" />
    <meta name="googlebot" content="index,follow" />
    <meta name="apple-mobile-web-app-title" content="{{BRAND}}" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <link type="text/css" rel="stylesheet" href="{{BASE_URL}}{{CSS_BUNDLE}}">

    {{CSS_VARIABLES}}
    {{STRUCTURED_DATA}}
    <script>
    // Theme detection before body renders (prevents FOUC). Default is light.
    (function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-boot');})();
    </script>
</head>
<body>
    <script>if(document.documentElement.classList.contains('dark-boot')){document.body.classList.add('dark-theme');document.documentElement.classList.remove('dark-boot');}</script>
    <div class="ambient-glow" aria-hidden="true"><div class="ambient-orb ambient-orb-1"></div><div class="ambient-orb ambient-orb-2"></div><div class="ambient-orb ambient-orb-3"></div><div class="ambient-orb ambient-orb-4"></div></div>
    <a class="u-skip-link" href="#main-content" data-i18n="skip_to_content">Skip to main content</a>

    <!-- Top bar -->
    <header class="topbar">
        <button class="topbar-menu" id="topbar-menu" aria-label="Toggle menu" aria-expanded="false" aria-controls="sidebar" data-i18n="toggle_menu" data-i18n-attr="aria-label">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <a href="{{BASE_URL}}" class="topbar-home" aria-label="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>

        <div class="topbar-search">
            <input type="search" id="search-input"
                placeholder="Search resources..."
                aria-label="Search resources"
                data-i18n="search_placeholder"
                data-i18n-attr="placeholder"
                data-i18n-aria="search_label">
            <div id="search-results" class="search-results" role="listbox" aria-live="polite" aria-atomic="false"></div>
        </div>

        <a href="{{BASE_URL}}take-action/#if-you-need-help-right-now" class="topbar-urgent" data-i18n="home_urgent_btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Help
        </a>
        <div class="topbar-actions">
            <div class="topbar-settings-wrap">
                <button class="topbar-settings-btn" id="settings-toggle" aria-expanded="false" aria-label="Settings" title="Settings" data-i18n="settings_label" data-i18n-attr="aria-label,title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
                <div class="topbar-settings-panel" id="settings-panel" hidden>
                    <div class="settings-row">
                        <label class="settings-label" for="lang-picker" data-i18n="settings_language">Language</label>
                        <select id="lang-picker" class="settings-select" aria-label="Select language" data-i18n="select_language" data-i18n-attr="aria-label">
                            <option value="en">English</option>
                            <option value="ar">العربية</option>
                            <option value="bn">বাংলা</option>
                            <option value="ca">Català</option>
                            <option value="zh">中文</option>
                            <option value="nl">Nederlands</option>
                            <option value="fi">Suomi</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="el">Ελληνικά</option>
                            <option value="hi">हिन्दी</option>
                            <option value="is">Íslenska</option>
                            <option value="ga">Gaeilge</option>
                            <option value="it">Italiano</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                            <option value="no">Norsk</option>
                            <option value="pl">Polski</option>
                            <option value="pt">Português</option>
                            <option value="ru">Русский</option>
                            <option value="es">Español</option>
                            <option value="sw">Kiswahili</option>
                            <option value="sv">Svenska</option>
                            <option value="tr">Türkçe</option>
                            <option value="uk">Українська</option>
                            <option value="vi">Tiếng Việt</option>
                        </select>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label" data-i18n="settings_theme">Theme</span>
                        <button class="settings-theme-btn" id="toggle-theme-btn" aria-label="Toggle light/dark mode" data-i18n="toggle_theme" data-i18n-attr="aria-label">
                            <svg class="toggle-icon sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                            <svg class="toggle-icon moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            <span class="settings-theme-label" data-i18n="settings_theme_toggle">Light / Dark</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar backdrop (mobile only; closes sidebar on tap) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" data-open="false"></div>

    <!-- Shell: sidebar + content -->
    <div class="shell">
        <aside class="sidebar" id="sidebar" data-open="false">
            <div class="sidebar-glow" aria-hidden="true"><div class="sidebar-orb sidebar-orb-1"></div><div class="sidebar-orb sidebar-orb-2"></div></div>
            <a href="{{BASE_URL}}take-action/#if-you-need-help-right-now" class="sidebar-help-link" data-i18n="home_urgent_btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Help
            </a>
            {{SIDEBAR_NAV}}
            <div class="sidebar-bottom">
                <div class="sidebar-prefs">
                    <select id="sidebar-lang-picker" class="topbar-lang sidebar-lang" aria-label="Select language" data-i18n="select_language" data-i18n-attr="aria-label">
                        <option value="en">English</option>
                        <option value="ar">العربية</option>
                        <option value="bn">বাংলা</option>
                        <option value="ca">Català</option>
                        <option value="zh">中文</option>
                        <option value="nl">Nederlands</option>
                        <option value="fi">Suomi</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="el">Ελληνικά</option>
                        <option value="hi">हिन्दी</option>
                        <option value="is">Íslenska</option>
                        <option value="ga">Gaeilge</option>
                        <option value="it">Italiano</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="no">Norsk</option>
                        <option value="pl">Polski</option>
                        <option value="pt">Português</option>
                        <option value="ru">Русский</option>
                        <option value="es">Español</option>
                        <option value="sw">Kiswahili</option>
                        <option value="sv">Svenska</option>
                        <option value="tr">Türkçe</option>
                        <option value="uk">Українська</option>
                        <option value="vi">Tiếng Việt</option>
                    </select>
                    <button class="topbar-theme sidebar-theme" id="sidebar-toggle-theme" title="Toggle light/dark mode" aria-label="Toggle light/dark mode" data-i18n="toggle_theme" data-i18n-attr="title,aria-label">
                        <svg class="toggle-icon sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="toggle-icon moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
                {{FOOTER_LINKS}}
                {{SOCIALS}}
                <p class="sidebar-disclaimer" data-i18n="sidebar_disclaimer">
                    For educational purposes only, not medical advice. Always consult a qualified healthcare provider.
                </p>
                <p class="footnote">
                    &copy; {{YEAR}} Bloomed Health
                </p>
            </div>
        </aside>

        <main class="content" id="main-content">
            {{PAGE_CONTENT}}
        </main>
    </div>

    <!-- Bottom nav (mobile only) -->
    <nav class="bottomnav" aria-label="Primary mobile navigation">
        <a href="{{BASE_URL}}" class="bottomnav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-5h-2v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span data-i18n="nav_home">Home</span>
        </a>
        <a href="{{BASE_URL}}quiz/" class="bottomnav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 10l2 2 4-4"/><path d="M9 16h6"/></svg>
            <span data-i18n="nav_quiz">Quiz</span>
        </a>
        <a href="{{BASE_URL}}endometriosis/" class="bottomnav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span data-i18n="nav_learn">Learn</span>
        </a>
        <a href="{{BASE_URL}}take-action/" class="bottomnav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg>
            <span data-i18n="nav_take_action">Act</span>
        </a>
    </nav>

    <!-- Back-to-top -->
    <button class="back-to-top-v2" id="back-to-top" aria-label="Back to top" title="Back to top" data-i18n="back_to_top" data-i18n-attr="title,aria-label">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"/>
        </svg>
    </button>

    <script>
    window.__searchIndexURL = '{{BASE_URL}}index.json';
    window.__translationsURL = '{{BASE_URL}}i18n/translations.json';
    </script>

    <script src="{{BASE_URL}}{{JS_BUNDLE}}"></script>
</body>
</html>
